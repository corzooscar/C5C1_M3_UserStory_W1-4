<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M3W3 User Story - Oczo</title>
  </head>
  <body class="min-h-full">
    <main class="w-full min-h-screen bg-[url('https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3eGE3eHlpMjd5d3VseWUwdHhvbW9wMXR0MTZneWk2ejJ2YWRhdjgwNiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/kGW7enajxQVHL6QOxL/giphy.gif')] bg-fixed bg-cover bg-center flex justify-center items-start py-32" id="app">
      <section class="w-175 flex flex-col items-center text-center p-8 rounded-3xl border-4 border-lime-950 bg-yellow-400/50 shadow-xl shadow-amber-200 gap-1">
        <h1 class="text-3xl text-yellow-900 font-bold underline"> This is Oczo's Attempt for M3W3 User Story </h1>
        <p class=" font-semibold">A very simple mini-app (notes list) that allows users to add and remove elements from the DOM, and save/retrieve that data using Local Storage.</p>
        <form id="notesForm" class="flex flex-row items-baseline-last justify-between w-full  gap-3.5 " >

          <div class="flex flex-col content-between items-start w-full">
            <label class="text-2xl text-yellow-900 font-bold" for="AddNote">Add a New Note:</label>
            <input id="inputNote" size="65" type="note" name="note" class="border border-state-400 py-1 px-2 rounded-lg" placeholder="Example: i will get 1 000 cats (●'◡'●)">
          </div>

          <button class="h-10 p-2 bg-lime-950 rounded hover:bg-lime-700 hover:text-zinc200 cursor-pointer text-amber-50 font-semibold" id="btnAdd">Add</button>

        </form>
        <ul class="flex flex-col py-3 gap-4" id="notesList">

        </ul>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
